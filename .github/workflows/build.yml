name: Compilar Robo Quiver

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl pyautogui pyperclip opencv-python

    - name: Criar o Executavel
      run: |
        pyinstaller --onefile main.py

    - name: Salvar Arquivo para Download
      uses: actions/upload-artifact@v4
      with:
        name: Robo-Quiver-Windows
        path: dist/main.exe
